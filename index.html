<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🥒 Christmas Pickle</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a3a0a;
      color: #f0e8d0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== LAUNCHER ===== */
    #screen-launcher {
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 16px 32px;
    }
    .launcher-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .launcher-header h1 { font-size: 2.2rem; letter-spacing: -0.5px; }
    .launcher-header .date { color: #a8d08d; font-size: 0.95rem; margin-top: 6px; }
    .launcher-header .tagline { color: #7aaa5a; font-size: 0.8rem; margin-top: 4px; }

    .prototype-grid { display: flex; flex-direction: column; gap: 12px; }

    .proto-card {
      background: #243d14;
      border: 2px solid #3a5e20;
      border-radius: 14px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: background 0.15s;
    }
    .proto-card.available {
      border-color: #6aab3e;
      cursor: pointer;
    }
    .proto-card.available:hover, .proto-card.available:active {
      background: #2e4e1a;
    }
    .proto-icon { font-size: 2rem; width: 44px; text-align: center; flex-shrink: 0; }
    .proto-info { flex: 1; min-width: 0; }
    .proto-name { font-weight: 700; font-size: 1rem; }
    .proto-desc { font-size: 0.78rem; color: #90b870; margin-top: 3px; line-height: 1.4; }
    .proto-score { font-size: 0.75rem; color: #ffd700; margin-top: 5px; }
    .proto-btn {
      background: #6aab3e;
      color: #0f2006;
      border: none;
      border-radius: 8px;
      padding: 9px 16px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .proto-btn:disabled {
      background: #2e3e20;
      color: #6a7a5a;
      cursor: not-allowed;
    }

    /* ===== GAME SCREEN ===== */
    #screen-game {
      display: none;
      flex-direction: column;
      height: 100dvh;
      height: 100vh;
    }
    #game-header {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      background: #243d14;
      gap: 10px;
      border-bottom: 2px solid #3a5e20;
      flex-shrink: 0;
    }
    #btn-back {
      background: none;
      border: 1px solid #6aab3e;
      color: #90b870;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
    }
    #game-title { flex: 1; font-weight: 700; font-size: 1rem; }
    #game-score { font-size: 0.9rem; color: #ffd700; font-weight: 600; white-space: nowrap; }

    #canvas-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      min-height: 0;
    }
    #game-canvas {
      display: block;
      touch-action: none;
    }

    #game-controls {
      display: flex;
      gap: 8px;
      justify-content: center;
      padding: 10px 16px;
      flex-shrink: 0;
      background: #1a3a0a;
    }
    .ctrl-btn {
      background: #243d14;
      border: 2px solid #3a5e20;
      color: #f0e8d0;
      padding: 9px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.1s;
    }
    .ctrl-btn.active {
      background: #6aab3e;
      color: #0f2006;
      border-color: #6aab3e;
    }

    /* ===== DUNGEON REVEAL OVERLAY ===== */
    #dungeon-reveal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      align-items: center;
      justify-content: center;
      z-index: 90;
      padding: 16px;
    }
    #dungeon-reveal-overlay.show { display: flex; }
    .reveal-card {
      background: #1e3a10;
      border: 3px solid #6aab3e;
      border-radius: 18px;
      padding: 28px 24px;
      text-align: center;
      max-width: 300px;
      width: 100%;
    }
    .reveal-card.pickle-mode { border-color: #ffd700; }
    .reveal-title {
      font-size: 1rem;
      color: #a8d08d;
      margin-bottom: 16px;
      font-weight: 600;
    }
    .reveal-title.pickle-mode { color: #ffd700; font-size: 1.1rem; }
    #dungeon-reveal-emoji {
      font-size: 5rem;
      line-height: 1.1;
      display: block;
      min-height: 6rem;
      transition: transform 0.08s;
    }
    #dungeon-reveal-emoji.landed {
      animation: revealBounce 0.45s ease-out;
    }
    @keyframes revealBounce {
      0%   { transform: scale(0.6); }
      55%  { transform: scale(1.35); }
      80%  { transform: scale(0.92); }
      100% { transform: scale(1); }
    }
    #dungeon-reveal-name {
      font-size: 1rem;
      color: #ffd700;
      font-weight: 700;
      margin-top: 10px;
      min-height: 1.4rem;
    }
    #dungeon-reveal-btn {
      margin-top: 20px;
      background: #6aab3e;
      color: #0f2006;
      border: none;
      border-radius: 10px;
      padding: 11px 28px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }
    #dungeon-reveal-btn.pickle-btn { background: #ffd700; color: #1a2a00; }
    #confetti-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: none;
    }

    /* ===== WIN OVERLAY ===== */
    #win-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 16px;
    }
    #win-overlay.show { display: flex; }
    .win-card {
      background: #243d14;
      border: 3px solid #ffd700;
      border-radius: 18px;
      padding: 28px 24px;
      text-align: center;
      max-width: 340px;
      width: 100%;
    }
    .win-card .big-pickle { font-size: 3.5rem; }
    .win-card h2 { font-size: 1.8rem; margin: 8px 0 4px; }
    .win-card .win-sub { color: #a8d08d; font-size: 0.9rem; }
    .win-card .win-score { font-size: 1.3rem; color: #ffd700; font-weight: 700; margin: 14px 0 4px; }
    .win-card .win-stars { font-size: 1.8rem; margin-bottom: 4px; }
    .win-card .win-label { font-size: 0.88rem; color: #90b870; margin-bottom: 18px; }
    .win-btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 11px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
    }
    .win-btn.primary { background: #6aab3e; color: #0f2006; }
    .win-btn.secondary { background: #243d14; border: 1px solid #3a5e20; color: #a8d08d; }
  </style>
</head>
<body>

<!-- ===== LAUNCHER ===== -->
<div id="screen-launcher">
  <div class="launcher-header">
    <h1>🥒 Christmas Pickle</h1>
    <div class="date" id="today-date-label"></div>
    <div class="tagline">Daily puzzles · Compare scores with family</div>
  </div>
  <div class="prototype-grid" id="prototype-grid"></div>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="screen-game">
  <div id="game-header">
    <button id="btn-back">← Menu</button>
    <div id="game-title">Tree Finder</div>
    <div id="game-score">Moves: 0</div>
  </div>
  <div id="canvas-container">
    <canvas id="game-canvas"></canvas>
  </div>
  <div id="game-controls"></div>
</div>

<!-- ===== DUNGEON REVEAL OVERLAY ===== -->
<div id="dungeon-reveal-overlay">
  <canvas id="confetti-canvas"></canvas>
  <div class="reveal-card" id="reveal-card">
    <div class="reveal-title" id="dungeon-reveal-title">You found...</div>
    <span id="dungeon-reveal-emoji">🎁</span>
    <div id="dungeon-reveal-name"></div>
    <button id="dungeon-reveal-btn" style="display:none">🎊 Hooray!</button>
  </div>
</div>

<!-- ===== WIN OVERLAY ===== -->
<div id="win-overlay">
  <div class="win-card">
    <div class="big-pickle">🥒</div>
    <h2>Found it!</h2>
    <div class="win-sub" id="win-sub-text"></div>
    <div class="win-score" id="win-score-text"></div>
    <div class="win-stars" id="win-stars"></div>
    <div class="win-label" id="win-label"></div>
    <button class="win-btn primary" id="btn-share">📋 Copy Score to Share</button>
    <button class="win-btn secondary" id="btn-win-close">Keep Playing</button>
  </div>
</div>

<script>
'use strict';

// ============================================================
// UTILITIES
// ============================================================

function getTodayString() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

function hashString(str) {
  // FNV-1a 32-bit
  let h = 0x811c9dc5 >>> 0;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 0x01000193) >>> 0;
  }
  return h;
}

function makePRNG(seed) {
  // Mulberry32 — fast, deterministic, good distribution
  let s = seed >>> 0;
  return function () {
    s |= 0;
    s = (s + 0x6D2B79F5) | 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function loadScore(protoId) {
  try {
    const key = `pickle-${getTodayString()}-${protoId}`;
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function saveScore(protoId, moves) {
  try {
    const key = `pickle-${getTodayString()}-${protoId}`;
    const existing = loadScore(protoId);
    // Only save if it's a new best (or first time)
    if (!existing || moves < existing.moves) {
      localStorage.setItem(key, JSON.stringify({ moves, date: getTodayString() }));
    }
  } catch {}
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// ============================================================
// PROTOTYPE REGISTRY
// ============================================================

const PROTOTYPES = [
  {
    id: 'grid-reveal',
    name: 'Tree Finder',
    icon: '🔍',
    desc: 'Tap cells on the Christmas tree to reveal temperature hints. Find the pickle in fewest taps.',
    available: true,
    create: (canvas, seed) => new GridRevealGame(canvas, seed),
  },
  {
    id: 'tree-dungeon',
    name: 'Tree Dungeon',
    icon: '🗺️',
    desc: 'Navigate the tree branch-by-branch like a dungeon. Limited visibility — explore carefully.',
    available: true,
    create: (canvas, seed) => new TreeDungeonGame(canvas, seed),
  },
  {
    id: 'light-strings',
    name: 'String of Lights',
    icon: '💡',
    desc: 'Rotate light-string segments to connect all paths. The pickle hides where they all meet.',
    available: true,
    create: (canvas, seed) => new StringOfLightsGame(canvas, seed),
  },
  {
    id: 'branch-pusher',
    name: 'Branch Pusher',
    icon: '🎄',
    desc: 'Slide branches and ornaments aside to dig down to the hidden pickle.',
    available: true,
    create: (canvas, seed) => new BranchPusherGame(canvas, seed),
  },
  {
    id: 'ornament-fling',
    name: 'Ornament Fling',
    icon: '🎯',
    desc: 'Drag and fling ornaments at tree zones to reveal them. Find the pickle in fewest flings.',
    available: false,
  },
];

// ============================================================
// LAUNCHER
// ============================================================

const TODAY = getTodayString();
const DAILY_SEED = hashString(TODAY);

document.getElementById('today-date-label').textContent = new Date().toLocaleDateString('en-US', {
  weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
});

function renderLauncher() {
  const grid = document.getElementById('prototype-grid');
  grid.innerHTML = '';
  for (const proto of PROTOTYPES) {
    const score = loadScore(proto.id);
    const card = document.createElement('div');
    card.className = 'proto-card' + (proto.available ? ' available' : '');

    const scoreHtml = score
      ? `<div class="proto-score">⭐ Today's best: ${score.moves} move${score.moves !== 1 ? 's' : ''}</div>`
      : '';

    card.innerHTML = `
      <div class="proto-icon">${proto.icon}</div>
      <div class="proto-info">
        <div class="proto-name">${proto.name}</div>
        <div class="proto-desc">${proto.desc}</div>
        ${scoreHtml}
      </div>
      <button class="proto-btn" ${proto.available ? '' : 'disabled'}>
        ${proto.available ? (score ? 'Play Again' : 'Play') : 'Soon'}
      </button>
    `;

    if (proto.available) {
      card.addEventListener('click', () => startGame(proto));
    }
    grid.appendChild(card);
  }
}

// ============================================================
// GAME SCREEN
// ============================================================

let currentGame = null;
let resizeHandler = null;
let keyHandler = null;

function renderControls() {
  const bar = document.getElementById('game-controls');
  bar.innerHTML = '';
  bar.style.flexDirection = '';
  bar.style.alignItems = '';
  if (!currentGame) return;
  // Games can fully customise the controls bar
  if (currentGame.renderCustomControls) {
    currentGame.renderCustomControls(bar);
    return;
  }
  if (!currentGame.getControls) return;
  for (const ctrl of currentGame.getControls()) {
    const btn = document.createElement('button');
    btn.className = 'ctrl-btn' + (ctrl.active ? ' active' : '');
    btn.textContent = ctrl.label;
    btn.addEventListener('click', () => {
      ctrl.action();
      renderControls();
    });
    bar.appendChild(btn);
  }
}

function startGame(proto) {
  // Switch screens
  document.getElementById('screen-launcher').style.display = 'none';
  const gameScreen = document.getElementById('screen-game');
  gameScreen.style.display = 'flex';
  document.getElementById('game-title').textContent = proto.name;
  document.getElementById('game-score').textContent = 'Moves: 0';

  const canvas = document.getElementById('game-canvas');
  const container = document.getElementById('canvas-container');

  // Create game instance
  currentGame = proto.create(canvas, DAILY_SEED);

  currentGame.onScoreUpdate = (moves) => {
    document.getElementById('game-score').textContent = `Moves: ${moves}`;
  };
  currentGame.onWin = (moves) => {
    saveScore(proto.id, moves);
    showWin(proto, moves);
  };
  currentGame.onControlsChange = renderControls;

  // Resize canvas to fit container
  function doResize() {
    const w = container.clientWidth;
    const h = container.clientHeight;
    currentGame.resize(w, h);
  }
  if (resizeHandler) window.removeEventListener('resize', resizeHandler);
  resizeHandler = doResize;
  window.addEventListener('resize', resizeHandler);
  doResize();

  renderControls();

  // Input: unified pointer handler with canvas coordinate mapping
  // (remove old listeners by replacing canvas clone)
  const newCanvas = canvas.cloneNode(true);
  canvas.parentNode.replaceChild(newCanvas, canvas);
  currentGame.canvas = newCanvas;
  currentGame.ctx = newCanvas.getContext('2d');
  doResize(); // re-render on new canvas

  let tapStart = null;
  newCanvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    newCanvas.setPointerCapture(e.pointerId);
    const rect = newCanvas.getBoundingClientRect();
    tapStart = {
      x: (e.clientX - rect.left) * (newCanvas.width / rect.width),
      y: (e.clientY - rect.top) * (newCanvas.height / rect.height),
      t: Date.now(),
    };
  });
  newCanvas.addEventListener('pointerup', (e) => {
    e.preventDefault();
    if (!tapStart) return;
    const rect = newCanvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (newCanvas.width / rect.width);
    const y = (e.clientY - rect.top) * (newCanvas.height / rect.height);
    const dx = x - tapStart.x;
    const dy = y - tapStart.y;
    if (Math.sqrt(dx * dx + dy * dy) < 12 && Date.now() - tapStart.t < 500) {
      currentGame.handleTap(x, y);
    }
    tapStart = null;
  });
  newCanvas.addEventListener('pointercancel', () => { tapStart = null; });

  // Keyboard arrow keys (desktop)
  if (keyHandler) window.removeEventListener('keydown', keyHandler);
  keyHandler = (e) => {
    if (!currentGame || !currentGame.move) return;
    const map = { ArrowUp:[-1,0], ArrowDown:[1,0], ArrowLeft:[0,-1], ArrowRight:[0,1],
                  w:[-1,0], s:[1,0], a:[0,-1], d:[0,1] };
    const dir = map[e.key];
    if (dir) { e.preventDefault(); currentGame.move(dir[0], dir[1]); }
  };
  window.addEventListener('keydown', keyHandler);
}

function goHome() {
  if (resizeHandler) { window.removeEventListener('resize', resizeHandler); resizeHandler = null; }
  if (keyHandler)    { window.removeEventListener('keydown', keyHandler);   keyHandler = null; }
  currentGame = null;
  document.getElementById('screen-game').style.display = 'none';
  document.getElementById('win-overlay').classList.remove('show');
  document.getElementById('screen-launcher').style.display = '';
  renderLauncher();
}

document.getElementById('btn-back').addEventListener('click', goHome);

// ============================================================
// WIN OVERLAY
// ============================================================

function scoreRating(moves, total) {
  const pct = moves / total;
  if (pct <= 0.12) return { stars: '⭐⭐⭐', label: 'Incredible! You have a nose for pickles!' };
  if (pct <= 0.30) return { stars: '⭐⭐', label: 'Great find! Very efficient!' };
  if (pct <= 0.55) return { stars: '⭐', label: 'Nice work — pickle found!' };
  return { stars: '🔍', label: 'You found it! Persistence pays off.' };
}

let _winProto = null;
let _winMoves = 0;

function showWin(proto, moves) {
  _winProto = proto;
  _winMoves = moves;
  const total = currentGame ? currentGame.totalCells : 40;
  const rating = scoreRating(moves, total);

  document.getElementById('win-sub-text').textContent = `The Christmas pickle was found!`;
  document.getElementById('win-score-text').textContent = `${moves} move${moves !== 1 ? 's' : ''}`;
  document.getElementById('win-stars').textContent = rating.stars;
  document.getElementById('win-label').textContent = rating.label;
  document.getElementById('win-overlay').classList.add('show');
}

document.getElementById('btn-share').addEventListener('click', () => {
  const total = currentGame ? currentGame.totalCells : 40;
  const rating = scoreRating(_winMoves, total);
  const text = [
    `🥒 Christmas Pickle — ${TODAY}`,
    `${_winProto ? _winProto.name : 'Tree Finder'}`,
    `${rating.stars} Found in ${_winMoves} move${_winMoves !== 1 ? 's' : ''}`,
    `(out of ${total} possible cells)`,
  ].join('\n');

  navigator.clipboard.writeText(text)
    .then(() => {
      const btn = document.getElementById('btn-share');
      btn.textContent = '✓ Copied!';
      setTimeout(() => { btn.textContent = '📋 Copy Score to Share'; }, 2000);
    })
    .catch(() => { alert('Copy manually:\n\n' + text); });
});

document.getElementById('btn-win-close').addEventListener('click', () => {
  document.getElementById('win-overlay').classList.remove('show');
});

// ============================================================
// PROTOTYPE: GRID REVEAL (Tree Finder)
// ============================================================
// The Christmas tree is a grid. Tap hidden cells to reveal how
// many steps (graph distance) they are from the pickle.
// 🔥 = 1 step away,  ❄ = far away.  Find the 🥒 in fewest taps.
// ============================================================

class GridRevealGame {
  constructor(canvas, seed) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.seed = seed;
    this.moves = 0;
    this.won = false;
    this.flagMode = false;

    // Callbacks set by startGame
    this.onScoreUpdate = null;
    this.onWin = null;
    this.onControlsChange = null;

    // Tree grid dimensions
    this.COLS = 9;
    this.ROWS = 8;

    // Build the set of valid tree cells (keys = "row,col")
    this._buildTree();

    // Place the pickle using a seeded RNG
    const rng = makePRNG(seed);
    // Pickable cells: not the star tip (row 0) or trunk (row 7)
    const pickable = [...this.treeCells].filter(k => {
      const r = parseInt(k);
      return r > 0 && r < this.ROWS - 1;
    });
    // Fisher-Yates shuffle then take first
    for (let i = pickable.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [pickable[i], pickable[j]] = [pickable[j], pickable[i]];
    }
    this.pickleKey = pickable[0];

    // Cell states
    this.cellState = {};
    for (const k of this.treeCells) this.cellState[k] = 'hidden';

    // Star is always shown
    this.starKey = `0,${Math.floor(this.COLS / 2)}`;
    this.cellState[this.starKey] = 'revealed';

    this.totalCells = pickable.length; // scoreable cells only

    this._computeDistances();
  }

  _buildTree() {
    // 9 columns (0–8), 8 rows (0–7)
    // Tiered Christmas tree shape:
    //   Row 0: col 4              (star tip)
    //   Row 1: cols 3–5           (tier 1 top)
    //   Row 2: cols 2–6
    //   Row 3: cols 1–7           (tier 1 base)
    //   Row 4: cols 2–6           (tier 2 top)
    //   Row 5: cols 1–7
    //   Row 6: cols 0–8           (tier 2/3 base — widest)
    //   Row 7: cols 3–5           (trunk)
    const ranges = [[4,4],[3,5],[2,6],[1,7],[2,6],[1,7],[0,8],[3,5]];
    this.treeCells = new Set();
    for (let r = 0; r < this.ROWS; r++) {
      const [lo, hi] = ranges[r];
      for (let c = lo; c <= hi; c++) {
        this.treeCells.add(`${r},${c}`);
      }
    }
  }

  _computeDistances() {
    // BFS from pickle to get graph distance for every tree cell
    this.dist = {};
    const queue = [this.pickleKey];
    this.dist[this.pickleKey] = 0;
    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    while (queue.length) {
      const key = queue.shift();
      const [r, c] = key.split(',').map(Number);
      for (const [dr, dc] of dirs) {
        const nk = `${r+dr},${c+dc}`;
        if (this.treeCells.has(nk) && !(nk in this.dist)) {
          this.dist[nk] = this.dist[key] + 1;
          queue.push(nk);
        }
      }
    }
  }

  resize(w, h) {
    this.canvas.width = w;
    this.canvas.height = h;
    // Reserve space at bottom for legend
    const legendH = 28;
    const usableH = h - legendH;
    const padX = 12, padY = 12;
    const cellW = (w - padX * 2) / this.COLS;
    const cellH = (usableH - padY * 2) / this.ROWS;
    this.cs = Math.floor(Math.min(cellW, cellH, 64));
    // Center the grid horizontally; start from top with padding
    this.ox = Math.floor((w - this.cs * this.COLS) / 2);
    this.oy = Math.floor((usableH - this.cs * this.ROWS) / 2) + padY;
    this.legendY = h - legendH / 2;
    this.render();
  }

  // Colour for a given graph distance (hot = red, cold = blue)
  _distColor(d) {
    const colors = ['#ff2222','#ff6600','#ffaa00','#ccdd00','#66cc44','#44aadd','#4477ff'];
    return colors[Math.min(d - 1, colors.length - 1)];
  }

  // Text label for distance
  _distLabel(d) {
    if (d === 1) return 'Very\nclose';
    if (d <= 3)  return 'Closer';
    if (d <= 5)  return 'Far';
    return 'Very\nfar';
  }

  render() {
    const { ctx, canvas, cs, ox, oy } = this;
    const w = canvas.width, h = canvas.height;

    // Background
    ctx.fillStyle = '#1a3a0a';
    ctx.fillRect(0, 0, w, h);

    for (const key of this.treeCells) {
      const [r, c] = key.split(',').map(Number);
      const x = ox + c * cs;
      const y = oy + r * cs;
      const gap = 3;
      const state = this.cellState[key];
      const isPickle = key === this.pickleKey;
      const isTrunk = r === this.ROWS - 1;
      const isStar = key === this.starKey;

      // Cell background
      ctx.save();
      roundRect(ctx, x + gap, y + gap, cs - gap * 2, cs - gap * 2, 5);

      if (state === 'hidden') {
        ctx.fillStyle = isTrunk ? '#5a3010' : '#2e5a1a';
        ctx.fill();
        // Subtle cell stroke
        ctx.strokeStyle = isTrunk ? '#6a3a18' : '#3a7020';
        ctx.lineWidth = 1;
        ctx.stroke();
      } else if (state === 'flagged') {
        ctx.fillStyle = '#1a2a5a';
        ctx.fill();
        ctx.strokeStyle = '#4477cc';
        ctx.lineWidth = 2;
        ctx.stroke();
      } else if (state === 'revealed') {
        if (isPickle) {
          ctx.fillStyle = '#1a3a0a';
          ctx.fill();
          ctx.strokeStyle = '#ffd700';
          ctx.lineWidth = 3;
          ctx.stroke();
        } else if (isStar) {
          ctx.fillStyle = '#2e5a1a';
          ctx.fill();
        } else {
          const d = this.dist[key];
          const col = this._distColor(d);
          ctx.fillStyle = col + '28';
          ctx.fill();
          ctx.strokeStyle = col;
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      }
      ctx.restore();

      // Cell content (emoji / icons)
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const cx = x + cs / 2;
      const cy = y + cs / 2;
      const emojiSize = Math.max(12, Math.floor(cs * 0.5));
      ctx.font = `${emojiSize}px serif`;

      if (isStar && state === 'revealed') {
        ctx.font = `${Math.floor(cs * 0.6)}px serif`;
        ctx.fillText('⭐', cx, cy);
      } else if (state === 'hidden') {
        if (isTrunk) {
          // Draw trunk wood grain
          ctx.fillStyle = '#8b5e3c';
          ctx.fillRect(cx - cs * 0.14, y + gap + 3, cs * 0.28, cs - gap * 2 - 6);
        } else {
          // Decorative ornament on some cells
          if ((r + c) % 3 === 1) {
            ctx.globalAlpha = 0.45;
            const ornaments = ['🔴','🟡','🔵','🟢'];
            ctx.font = `${Math.floor(cs * 0.38)}px serif`;
            ctx.fillText(ornaments[(r * 9 + c) % ornaments.length], cx, cy);
          }
        }
      } else if (state === 'flagged') {
        ctx.fillText('🚩', cx, cy);
      } else if (state === 'revealed' && !isStar) {
        if (isPickle) {
          ctx.font = `${Math.floor(cs * 0.65)}px serif`;
          ctx.fillText('🥒', cx, cy);
        } else {
          const d = this.dist[key];
          const label = this._distLabel(d);
          const lines = label.split('\n');
          const fontSize = Math.max(9, Math.floor(cs * 0.2));
          ctx.font = `bold ${fontSize}px sans-serif`;
          ctx.fillStyle = this._distColor(d);
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          const lineH = fontSize + 2;
          const startY = cy - ((lines.length - 1) * lineH) / 2;
          for (let i = 0; i < lines.length; i++) {
            ctx.fillText(lines[i], cx, startY + i * lineH);
          }
        }
      }
      ctx.restore();
    }

    // Legend bar at bottom
    this._drawLegend();
  }

  _drawLegend() {
    const ctx = this.ctx;
    const y = this.legendY;
    const items = [
      { label: 'Very close', d: 1 },
      { label: 'Closer',     d: 2 },
      { label: 'Far',        d: 4 },
      { label: 'Very far',   d: 6 },
    ];
    ctx.save();
    ctx.font = 'bold 11px sans-serif';
    ctx.textBaseline = 'middle';
    const totalW = items.length * 80;
    let x = Math.floor((this.canvas.width - totalW) / 2);
    for (const item of items) {
      ctx.fillStyle = this._distColor(item.d);
      ctx.fillText(item.label, x, y);
      x += 80;
    }
    ctx.restore();
  }

  handleTap(px, py) {
    if (this.won) return;
    const { cs, ox, oy } = this;
    const c = Math.floor((px - ox) / cs);
    const r = Math.floor((py - oy) / cs);
    const key = `${r},${c}`;

    if (!this.treeCells.has(key)) return;
    const state = this.cellState[key];

    if (this.flagMode) {
      if (state === 'hidden') {
        this.cellState[key] = 'flagged';
        this.moves++;
        if (this.onScoreUpdate) this.onScoreUpdate(this.moves);
      } else if (state === 'flagged') {
        this.cellState[key] = 'hidden';
      }
      this.render();
      return;
    }

    // Reveal mode
    if (state !== 'hidden') return;
    this.cellState[key] = 'revealed';
    this.moves++;
    if (this.onScoreUpdate) this.onScoreUpdate(this.moves);

    if (key === this.pickleKey) {
      this.won = true;
      this.render();
      setTimeout(() => { if (this.onWin) this.onWin(this.moves); }, 350);
    } else {
      this.render();
    }
  }

  getControls() {
    return [
      { label: '🔍 Reveal', active: !this.flagMode, action: () => { this.flagMode = false; } },
      { label: '🚩 Flag',   active:  this.flagMode, action: () => { this.flagMode = true;  } },
    ];
  }
}

// ============================================================
// PROTOTYPE: TREE DUNGEON
// ============================================================
// The Christmas tree is a dungeon. Navigate room by room with
// limited fog-of-war vision. Each room hides a decoration —
// one hides the 🥒. Find it in fewest moves.
// Tap an adjacent visible room to move, or use the d-pad.
// ============================================================

class TreeDungeonGame {
  constructor(canvas, seed) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.seed = seed;
    this.moves = 0;
    this.won = false;
    this.animating = false; // block input during slot machine reveal

    this.onScoreUpdate = null;
    this.onWin = null;

    this.COLS = 9;
    this.ROWS = 8;
    this._buildTree();

    const rng = makePRNG(seed ^ 0xDEADBEEF);

    // Shuffle all cells
    const allCells = [...this.treeCells];
    for (let i = allCells.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [allCells[i], allCells[j]] = [allCells[j], allCells[i]];
    }

    // ~1/3 of cells have an ornament
    const itemCount = Math.max(6, Math.floor(allCells.length / 3));
    this.itemCells = new Set(allCells.slice(0, itemCount));

    // Place pickle in a non-tip, non-trunk cell (ensure it's an item cell)
    const pickable = allCells.filter(k => { const r = parseInt(k); return r > 0 && r < this.ROWS - 1; });
    for (let i = pickable.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [pickable[i], pickable[j]] = [pickable[j], pickable[i]];
    }
    this.pickleKey = pickable[0];
    this.itemCells.add(this.pickleKey);

    // Assign decorations to item cells
    const decors = ['🎁','🕯️','🔔','🎅','🦌','⛄','🌟','🧦','🍪','🥛','🎶','❤️','🎈'];
    this.cellDecor = {};
    for (const k of this.itemCells) {
      this.cellDecor[k] = k === this.pickleKey ? '🥒' : decors[Math.floor(rng() * decors.length)];
    }

    // Player starts at trunk centre
    this.playerKey = `${this.ROWS - 1},4`;
    if (!this.treeCells.has(this.playerKey)) {
      this.playerKey = [...this.treeCells].find(k => k.startsWith(`${this.ROWS - 1},`));
    }

    // visited: cells the player has entered; peeked: cells adjacent to any visited cell
    this.visited = new Set([this.playerKey]);
    this.peeked = new Set(this._neighbors(this.playerKey));

    this.totalCells = pickable.length;
  }

  _buildTree() {
    const ranges = [[4,4],[3,5],[2,6],[1,7],[2,6],[1,7],[0,8],[3,5]];
    this.treeCells = new Set();
    for (let r = 0; r < this.ROWS; r++) {
      const [lo, hi] = ranges[r];
      for (let c = lo; c <= hi; c++) this.treeCells.add(`${r},${c}`);
    }
  }

  _neighbors(key) {
    const [r, c] = key.split(',').map(Number);
    return [[-1,0],[1,0],[0,-1],[0,1]]
      .map(([dr,dc]) => `${r+dr},${c+dc}`)
      .filter(k => this.treeCells.has(k));
  }

  move(dr, dc) {
    if (this.won || this.animating) return;
    const [r, c] = this.playerKey.split(',').map(Number);
    const nk = `${r + dr},${c + dc}`;
    if (!this.treeCells.has(nk)) return;
    if (!this.peeked.has(nk) && !this.visited.has(nk)) return;

    const isNewVisit = !this.visited.has(nk);
    this.playerKey = nk;
    this.moves++;
    if (this.onScoreUpdate) this.onScoreUpdate(this.moves);

    this.visited.add(nk);
    for (const nb of this._neighbors(nk)) this.peeked.add(nb);

    this.render();

    // Trigger reveal only on first entry into an item cell
    if (isNewVisit && this.itemCells.has(nk)) {
      const emoji = this.cellDecor[nk];
      const isPickle = nk === this.pickleKey;
      this.animating = true;
      this._showReveal(emoji, isPickle, () => {
        this.animating = false;
        if (isPickle) {
          this.won = true;
          this.render();
          setTimeout(() => { if (this.onWin) this.onWin(this.moves); }, 200);
        }
      });
    }
  }

  handleTap(px, py) {
    if (this.won || this.animating) return;
    const { cs, ox, oy } = this;
    const c = Math.floor((px - ox) / cs);
    const r = Math.floor((py - oy) / cs);
    const key = `${r},${c}`;
    if (!this.treeCells.has(key)) return;
    if (!this.peeked.has(key) && !this.visited.has(key)) return;

    const [pr, pc] = this.playerKey.split(',').map(Number);
    const dr = r - pr, dc = c - pc;
    if (Math.abs(dr) + Math.abs(dc) === 1) this.move(dr, dc);
  }

  _showReveal(emoji, isPickle, onDone) {
    const overlay       = document.getElementById('dungeon-reveal-overlay');
    const card          = document.getElementById('reveal-card');
    const titleEl       = document.getElementById('dungeon-reveal-title');
    const emojiEl       = document.getElementById('dungeon-reveal-emoji');
    const nameEl        = document.getElementById('dungeon-reveal-name');
    const btn           = document.getElementById('dungeon-reveal-btn');
    const confettiCvs   = document.getElementById('confetti-canvas');

    card.className    = 'reveal-card' + (isPickle ? ' pickle-mode' : '');
    titleEl.className = 'reveal-title' + (isPickle ? ' pickle-mode' : '');
    titleEl.textContent = isPickle ? '🎉 You found the Christmas Pickle! 🎉' : 'You found...';
    nameEl.textContent = '';
    btn.style.display = 'none';
    btn.className = isPickle ? 'pickle-btn' : '';
    emojiEl.className = '';
    confettiCvs.style.display = 'none';
    overlay.classList.add('show');

    const pool = ['🎁','🔔','🕯️','🎅','🦌','⛄','🌟','🧦','🍪','🥛','🎶','❤️','🎈','🌲','⭐','🍬'];
    const totalSteps = 26;
    let step = 0;
    let tickId = null;
    let landed = false;
    let confettiRaf = null;

    // Halved delays: ~22ms → ~190ms
    const getDelay = s => Math.round(22 + 168 * Math.pow(s / totalSteps, 2.2));

    const stopConfetti = () => {
      if (confettiRaf) { cancelAnimationFrame(confettiRaf); confettiRaf = null; }
      confettiCvs.style.display = 'none';
    };

    const closeReveal = () => {
      stopConfetti();
      overlay.classList.remove('show');
      onDone();
    };

    const startConfetti = () => {
      confettiCvs.width  = overlay.clientWidth;
      confettiCvs.height = overlay.clientHeight;
      confettiCvs.style.display = '';
      const ctx = confettiCvs.getContext('2d');
      const particles = Array.from({ length: 40 }, () => ({
        x: Math.random() * confettiCvs.width,
        y: -30 - Math.random() * 250,
        speed: 1.5 + Math.random() * 2.5,
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.03 + Math.random() * 0.05,
        size: 18 + Math.random() * 22,
      }));
      const loop = () => {
        ctx.clearRect(0, 0, confettiCvs.width, confettiCvs.height);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        for (const p of particles) {
          p.y += p.speed;
          p.wobble += p.wobbleSpeed;
          p.x += Math.sin(p.wobble) * 2;
          if (p.y > confettiCvs.height + 40) { p.y = -40; p.x = Math.random() * confettiCvs.width; }
          ctx.globalAlpha = 0.82;
          ctx.font = `${p.size}px serif`;
          ctx.fillText('🥒', p.x, p.y);
        }
        confettiRaf = requestAnimationFrame(loop);
      };
      loop();
    };

    const land = () => {
      if (landed) return;
      landed = true;
      if (tickId) { clearTimeout(tickId); tickId = null; }
      removeSlotListeners();

      emojiEl.textContent = emoji;
      void emojiEl.offsetWidth; // force reflow to restart animation
      emojiEl.classList.add('landed');

      if (isPickle) {
        nameEl.textContent = 'The Christmas Pickle! 🥒';
        startConfetti();
        btn.style.display = '';
        btn.onclick = () => closeReveal();
        // No auto-close — player must click Hooray
      } else {
        // Auto-close after 2s; any input closes immediately
        let autoClose = setTimeout(() => { removeCloseListeners(); closeReveal(); }, 2000);
        const onClose = () => { clearTimeout(autoClose); removeCloseListeners(); closeReveal(); };
        const removeCloseListeners = () => {
          overlay.removeEventListener('pointerdown', onClose);
          window.removeEventListener('keydown', onClose);
        };
        overlay.addEventListener('pointerdown', onClose, { once: true });
        window.addEventListener('keydown', onClose, { once: true });
      }
    };

    // During slot machine: any input skips to end
    const onSkip = (e) => { e.stopPropagation(); land(); };
    const removeSlotListeners = () => {
      overlay.removeEventListener('pointerdown', onSkip);
      window.removeEventListener('keydown', onSkip);
    };
    overlay.addEventListener('pointerdown', onSkip);
    window.addEventListener('keydown', onSkip);

    const tick = () => {
      step++;
      if (step >= totalSteps) { removeSlotListeners(); land(); return; }
      emojiEl.textContent = step >= totalSteps - 3 ? emoji : pool[Math.floor(Math.random() * pool.length)];
      tickId = setTimeout(tick, getDelay(step));
    };

    emojiEl.textContent = pool[0];
    tickId = setTimeout(tick, getDelay(0));
  }

  resize(w, h) {
    this.canvas.width = w;
    this.canvas.height = h;
    const pad = 12;
    const cellW = (w - pad * 2) / this.COLS;
    const cellH = (h - pad * 2) / this.ROWS;
    this.cs = Math.floor(Math.min(cellW, cellH, 64));
    this.ox = Math.floor((w - this.cs * this.COLS) / 2);
    this.oy = Math.floor((h - this.cs * this.ROWS) / 2);
    this.render();
  }

  render() {
    const { ctx, canvas, cs, ox, oy } = this;
    const w = canvas.width, h = canvas.height;

    ctx.fillStyle = '#0f1a07';
    ctx.fillRect(0, 0, w, h);

    const currentNeighbors = new Set(this._neighbors(this.playerKey));

    for (const key of this.treeCells) {
      const [r, c] = key.split(',').map(Number);
      const x = ox + c * cs;
      const y = oy + r * cs;
      const gap = 3;
      const isPlayer   = key === this.playerKey;
      const isTrunk    = r === this.ROWS - 1;
      const isVisited  = this.visited.has(key);
      const isPeeked   = this.peeked.has(key);
      const hasItem    = this.itemCells.has(key);
      const isReachable = currentNeighbors.has(key);

      // Background
      ctx.save();
      roundRect(ctx, x + gap, y + gap, cs - gap * 2, cs - gap * 2, 5);
      if (!isVisited && !isPeeked) {
        ctx.fillStyle = '#0a1205';
        ctx.fill();
      } else if (!isVisited) {
        // Peeked but not entered
        ctx.fillStyle = isTrunk ? '#3a1e0c' : '#1e3d10';
        ctx.fill();
        if (isReachable) {
          ctx.strokeStyle = '#88cc55';
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      } else {
        // Visited
        ctx.fillStyle = isTrunk ? '#5a3010' : '#2e5a1a';
        ctx.fill();
        ctx.strokeStyle = isPlayer ? '#ffd700' : '#3a6a20';
        ctx.lineWidth = isPlayer ? 3 : 1;
        ctx.stroke();
      }
      ctx.restore();

      // Content
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const cx = x + cs / 2;
      const cy = y + cs / 2;
      const emojiSize = Math.floor(cs * 0.5);

      if (!isVisited && isPeeked && hasItem) {
        // ✨ indicates something is here — but not what
        ctx.globalAlpha = isReachable ? 0.9 : 0.6;
        ctx.font = `${emojiSize}px serif`;
        ctx.fillText('✨', cx, cy);
      } else if (isVisited) {
        if (isPlayer) {
          ctx.font = `${emojiSize}px serif`;
          ctx.fillText('🧒', cx, cy);
        } else if (hasItem) {
          // Show collected item, dimmed
          ctx.globalAlpha = 0.45;
          ctx.font = `${Math.floor(cs * 0.44)}px serif`;
          ctx.fillText(this.cellDecor[key], cx, cy);
        }
        // Empty visited cells show nothing
      }
      ctx.restore();
    }

    this._drawLegend();
  }

  _drawLegend() {
    const ctx = this.ctx;
    const y = this.canvas.height - 14;
    ctx.save();
    ctx.font = '11px sans-serif';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#6a8a5a';
    ctx.textAlign = 'center';
    ctx.fillText('✨ = something hidden here   🧒 = you   tap or d-pad to move', this.canvas.width / 2, y);
    ctx.restore();
  }

  renderCustomControls(bar) {
    bar.style.flexDirection = 'column';
    bar.style.alignItems = 'center';
    bar.style.gap = '4px';

    const makeBtn = (label, dr, dc) => {
      const btn = document.createElement('button');
      btn.className = 'ctrl-btn';
      btn.textContent = label;
      btn.style.cssText = 'width:52px;padding:8px 0;';
      btn.addEventListener('click', () => this.move(dr, dc));
      return btn;
    };

    const row1 = document.createElement('div');
    row1.style.cssText = 'display:flex;gap:4px;';
    row1.appendChild(makeBtn('⬆', -1, 0));

    const row2 = document.createElement('div');
    row2.style.cssText = 'display:flex;gap:4px;';
    row2.appendChild(makeBtn('⬅', 0, -1));
    row2.appendChild(makeBtn('⬇', 1, 0));
    row2.appendChild(makeBtn('➡', 0, 1));

    bar.appendChild(row1);
    bar.appendChild(row2);
  }
}

// ============================================================
// PROTOTYPE: STRING OF LIGHTS
// ============================================================
// Pipe-puzzle: tap tiles to rotate them 90° CW.
// Connect both 🔌 plugs to the hidden 🥒 pickle through a
// valid chain of matching pipe connections.
// Score = rotations used.
// ============================================================

// ---- Pipe helpers (module-level) ----

// Canonical connections [N, E, S, W] for each tile type at rotation 0
const PIPE_CONNS = {
  end:      [1,0,0,0],
  straight: [1,0,1,0],
  corner:   [1,1,0,0],
  tee:      [1,1,1,0],
  cross:    [1,1,1,1],
};

// Rotate [N,E,S,W] one step clockwise → [W,N,E,S]
function pipeCW(c) { return [c[3], c[0], c[1], c[2]]; }

// Get connections for a tile at a given rotation (0–3)
function pipeConns(type, rot) {
  let c = [...PIPE_CONNS[type]];
  for (let i = 0; i < rot; i++) c = pipeCW(c);
  return c;
}

// Given a target [N,E,S,W] connection pattern, find the matching tile type + rotation
function pipeFromConn(target) {
  for (const type of Object.keys(PIPE_CONNS)) {
    for (let rot = 0; rot < 4; rot++) {
      const c = pipeConns(type, rot);
      if (c.every((v, i) => v === target[i])) return { type, rot };
    }
  }
  return { type: 'end', rot: 0 }; // fallback
}

function pipeShuffled(arr, rng) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ---- Game class ----

class StringOfLightsGame {
  constructor(canvas, seed) {
    this.canvas = canvas;
    this.ctx    = canvas.getContext('2d');
    this.seed   = seed;
    this.moves  = 0;
    this.won    = false;

    this.onScoreUpdate = null;
    this.onWin         = null;

    this.ROWS = 5;
    this.COLS = 5;

    // Sources at two corners; sink at centre
    this.sourceKeys = new Set(['0,0', `${this.ROWS-1},${this.COLS-1}`]);
    this.sinkKey    = `${Math.floor(this.ROWS/2)},${Math.floor(this.COLS/2)}`;

    this._generate(makePRNG(seed ^ 0xC4FEB4BE));
    this.totalCells = 30; // benchmark for score rating
  }

  _inBounds(r, c) { return r >= 0 && r < this.ROWS && c >= 0 && c < this.COLS; }

  _edgeKey(a, b) { return [a, b].sort().join('|'); }

  _neighbors(r, c) {
    return [[-1,0],[0,1],[1,0],[0,-1]]
      .map(([dr,dc]) => [r+dr, c+dc])
      .filter(([nr,nc]) => this._inBounds(nr, nc));
  }

  _generate(rng) {
    const { ROWS, COLS } = this;

    // Build a randomised spanning tree via DFS
    const visited = new Set();
    const edges   = new Set();

    const dfs = (r, c) => {
      visited.add(`${r},${c}`);
      for (const [nr, nc] of pipeShuffled(this._neighbors(r, c), rng)) {
        if (!visited.has(`${nr},${nc}`)) {
          edges.add(this._edgeKey(`${r},${c}`, `${nr},${nc}`));
          dfs(nr, nc);
        }
      }
    };
    dfs(0, 0);

    // Assign tile type + solved rotation for each cell
    this.tiles = {};
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const key = `${r},${c}`;

        // Which directions does this cell connect in the solved state?
        const dirs = [[-1,0], [0,1], [1,0], [0,-1]]; // N E S W
        const solvedConn = dirs.map(([dr,dc]) => {
          const [nr,nc] = [r+dr, c+dc];
          return this._inBounds(nr,nc) && edges.has(this._edgeKey(key, `${nr},${nc}`)) ? 1 : 0;
        });

        const { type, rot: solvedRot } = pipeFromConn(solvedConn);
        const scramble = Math.floor(rng() * 4);
        this.tiles[key] = { type, rotation: (solvedRot + scramble) % 4 };
      }
    }
  }

  // BFS from all sources following live pipe connections; returns Set of connected keys
  _computeConnected() {
    const { ROWS, COLS } = this;
    const connected = new Set(this.sourceKeys);
    const queue     = [...this.sourceKeys];

    while (queue.length) {
      const key = queue.shift();
      const [r, c] = key.split(',').map(Number);
      const conns  = pipeConns(this.tiles[key].type, this.tiles[key].rotation);
      const dirs   = [[-1,0,0], [0,1,1], [1,0,2], [0,-1,3]]; // [dr,dc,dirIndex]
      const opp    = [2, 3, 0, 1]; // opposite direction index

      for (const [dr, dc, di] of dirs) {
        if (!conns[di]) continue;
        const [nr, nc] = [r+dr, c+dc];
        if (!this._inBounds(nr, nc)) continue;
        const nk      = `${nr},${nc}`;
        const nConns  = pipeConns(this.tiles[nk].type, this.tiles[nk].rotation);
        if (nConns[opp[di]] && !connected.has(nk)) {
          connected.add(nk);
          queue.push(nk);
        }
      }
    }
    return connected;
  }

  handleTap(px, py) {
    if (this.won) return;
    const { cs, ox, oy } = this;
    const c = Math.floor((px - ox) / cs);
    const r = Math.floor((py - oy) / cs);
    if (!this._inBounds(r, c)) return;

    const key = `${r},${c}`;
    this.tiles[key].rotation = (this.tiles[key].rotation + 1) % 4;
    this.moves++;
    if (this.onScoreUpdate) this.onScoreUpdate(this.moves);

    const connected = this._computeConnected();
    if (connected.has(this.sinkKey)) {
      this.won = true;
      this.render(connected);
      setTimeout(() => { if (this.onWin) this.onWin(this.moves); }, 700);
    } else {
      this.render(connected);
    }
  }

  resize(w, h) {
    this.canvas.width  = w;
    this.canvas.height = h;
    const legendH = 30;
    const cellW = (w - 24) / this.COLS;
    const cellH = (h - 24 - legendH) / this.ROWS;
    this.cs = Math.floor(Math.min(cellW, cellH, 90));
    this.ox = Math.floor((w - this.cs * this.COLS) / 2);
    this.oy = Math.floor(((h - legendH) - this.cs * this.ROWS) / 2);
    this.legendY = h - legendH / 2;
    this.render();
  }

  render(connected) {
    if (!connected) connected = this._computeConnected();
    const { ctx, canvas, cs, ox, oy, ROWS, COLS } = this;

    ctx.fillStyle = '#0f1a07';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const key = `${r},${c}`;
        this._drawCell(
          ox + c * cs, oy + r * cs, cs,
          this.tiles[key],
          connected.has(key),
          this.sourceKeys.has(key),
          key === this.sinkKey,
        );
      }
    }

    this._drawLegend();
  }

  _drawCell(x, y, cs, tile, isLit, isSource, isSink) {
    const ctx  = this.ctx;
    const gap  = 4;
    const cx   = x + cs / 2;
    const cy   = y + cs / 2;
    const conns = pipeConns(tile.type, tile.rotation);

    // Background
    ctx.save();
    roundRect(ctx, x + gap, y + gap, cs - gap*2, cs - gap*2, 7);
    ctx.fillStyle = isLit ? '#1e4a12' : '#141f0a';
    ctx.fill();
    if (isSource) { ctx.strokeStyle = '#5588ff'; ctx.lineWidth = 2.5; ctx.stroke(); }
    if (isSink)   { ctx.strokeStyle = isLit ? '#ffd700' : '#888844'; ctx.lineWidth = 2.5; ctx.stroke(); }
    ctx.restore();

    // Pipe segments: line from centre to each connected edge midpoint
    const edgePts = [
      [cx, y + gap + 1],        // N
      [x + cs - gap - 1, cy],   // E
      [cx, y + cs - gap - 1],   // S
      [x + gap + 1, cy],        // W
    ];
    const pipeW  = Math.max(4, cs * 0.18);
    const litCol = '#ffdd00';
    const dimCol = '#2e5a1e';
    const glowCol = 'rgba(255,220,0,0.25)';

    ctx.save();
    ctx.lineCap = 'round';

    // Glow pass for lit pipes
    if (isLit) {
      ctx.lineWidth = pipeW + 8;
      ctx.strokeStyle = glowCol;
      for (let di = 0; di < 4; di++) {
        if (!conns[di]) continue;
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(...edgePts[di]); ctx.stroke();
      }
    }

    // Main pipe lines
    ctx.lineWidth = pipeW;
    for (let di = 0; di < 4; di++) {
      if (!conns[di]) continue;
      ctx.strokeStyle = isLit ? litCol : dimCol;
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(...edgePts[di]); ctx.stroke();
    }

    // Centre node
    ctx.fillStyle = isLit ? litCol : dimCol;
    if (isLit) { ctx.shadowColor = litCol; ctx.shadowBlur = 8; }
    ctx.beginPath();
    ctx.arc(cx, cy, Math.max(3, cs * 0.11), 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();

    // Source / sink icon (small, bottom-right corner)
    if (isSource || isSink) {
      ctx.save();
      ctx.font = `${Math.floor(cs * 0.3)}px serif`;
      ctx.textAlign = 'right';
      ctx.textBaseline = 'bottom';
      ctx.fillText(
        isSource ? '🔌' : (isLit ? '🥒' : '🎁'),
        x + cs - gap - 2,
        y + cs - gap - 2,
      );
      ctx.restore();
    }
  }

  _drawLegend() {
    const ctx = this.ctx;
    ctx.save();
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#6a8a5a';
    ctx.fillText('Tap a tile to rotate it • Connect both 🔌 plugs to the 🎁 pickle', this.canvas.width / 2, this.legendY);
    ctx.restore();
  }
}

// ============================================================
// PROTOTYPE: BRANCH PUSHER
// ============================================================
// Sokoban-style: navigate around ornament blocks and push them
// out of the way. The 🥒 pickle is hidden under one of them.
// Only pushes cost a move — walking is free. Push as few
// wrong blocks as possible.
// ============================================================

class BranchPusherGame {
  constructor(canvas, seed) {
    this.canvas = canvas;
    this.ctx    = canvas.getContext('2d');
    this.seed   = seed;
    this.moves  = 0; // pushes only
    this.won    = false;

    this.onScoreUpdate = null;
    this.onWin         = null;

    this.ROWS = 6;
    this.COLS = 6;
    this.BLOCK_COUNT = 9;

    this._generate();
    this.totalCells = this.BLOCK_COUNT;
  }

  _generate() {
    const rng = makePRNG(this.seed ^ 0xB40CB40C);

    // Player starts bottom-centre
    this.playerKey = `${this.ROWS - 1},${Math.floor(this.COLS / 2)}`;

    // Shuffle all non-player cells and pick block positions
    const candidates = [];
    for (let r = 0; r < this.ROWS; r++)
      for (let c = 0; c < this.COLS; c++)
        if (`${r},${c}` !== this.playerKey) candidates.push(`${r},${c}`);

    for (let i = candidates.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
    }

    const blockCells = candidates.slice(0, this.BLOCK_COUNT);
    this.blocks = new Set(blockCells);

    // One block hides the pickle (seeded)
    this.pickleBlockKey   = blockCells[Math.floor(rng() * this.BLOCK_COUNT)];
    this.pickleRevealedAt = null; // set to key when revealed

    // Assign a random ornament emoji to each block
    const decors = ['🎄','🔴','🟡','🔵','🟢','🎁','🔔','⭐','🧸','🎈','🕯️','🦌'];
    this.blockDecor = {};
    for (const k of this.blocks)
      this.blockDecor[k] = decors[Math.floor(rng() * decors.length)];
  }

  _inBounds(r, c) { return r >= 0 && r < this.ROWS && c >= 0 && c < this.COLS; }

  move(dr, dc) {
    if (this.won) return;
    const [pr, pc] = this.playerKey.split(',').map(Number);
    const tr = pr + dr, tc = pc + dc;
    if (!this._inBounds(tr, tc)) return;
    const targetKey = `${tr},${tc}`;

    if (!this.blocks.has(targetKey)) {
      // Empty cell — free move, no score cost
      this.playerKey = targetKey;
      // If player steps onto the already-revealed pickle, win
      if (this.pickleRevealedAt === targetKey) {
        this._win();
      } else {
        this.render();
      }
      return;
    }

    // Target has a block — try to push it
    const br = tr + dr, bc = tc + dc;
    if (!this._inBounds(br, bc)) return;           // block at edge
    const pushKey = `${br},${bc}`;
    if (this.blocks.has(pushKey)) return;           // blocked by another block
    if (this.pickleRevealedAt === pushKey) return;  // can't push into revealed pickle

    // Execute push
    const wasPickleBlock = targetKey === this.pickleBlockKey;
    const decor = this.blockDecor[targetKey];

    this.blocks.delete(targetKey);
    this.blocks.add(pushKey);
    this.blockDecor[pushKey] = decor;
    delete this.blockDecor[targetKey];
    if (wasPickleBlock) this.pickleBlockKey = pushKey; // track block's new location

    this.playerKey = targetKey;
    this.moves++;
    if (this.onScoreUpdate) this.onScoreUpdate(this.moves);

    if (wasPickleBlock) {
      // Pickle revealed at targetKey — player is already standing on it → win
      this.pickleRevealedAt = targetKey;
      this._win();
    } else {
      this.render();
    }
  }

  _win() {
    this.won = true;
    this.render();
    setTimeout(() => { if (this.onWin) this.onWin(this.moves); }, 450);
  }

  handleTap(px, py) {
    if (this.won) return;
    const { cs, ox, oy } = this;
    const c = Math.floor((px - ox) / cs);
    const r = Math.floor((py - oy) / cs);
    if (!this._inBounds(r, c)) return;
    const [pr, pc] = this.playerKey.split(',').map(Number);
    const dr = r - pr, dc = c - pc;
    if (Math.abs(dr) + Math.abs(dc) === 1) this.move(dr, dc);
  }

  resize(w, h) {
    this.canvas.width  = w;
    this.canvas.height = h;
    const legendH = 30;
    const cellW = (w - 24) / this.COLS;
    const cellH = (h - 24 - legendH) / this.ROWS;
    this.cs = Math.floor(Math.min(cellW, cellH, 90));
    this.ox = Math.floor((w - this.cs * this.COLS) / 2);
    this.oy = Math.floor(((h - legendH) - this.cs * this.ROWS) / 2);
    this.legendY = h - legendH / 2;
    this.render();
  }

  render() {
    const { ctx, canvas, cs, ox, oy, ROWS, COLS } = this;
    ctx.fillStyle = '#1a3a0a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw grid lines faintly so empty cells are visible
    ctx.strokeStyle = '#223a12';
    ctx.lineWidth = 1;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const x = ox + c * cs, y = oy + r * cs;
        ctx.strokeRect(x + 2, y + 2, cs - 4, cs - 4);
      }
    }

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const key      = `${r},${c}`;
        const x        = ox + c * cs, y = oy + r * cs;
        const gap      = 3;
        const isPlayer = key === this.playerKey;
        const hasBlock = this.blocks.has(key);
        const isPickle = this.pickleRevealedAt === key;

        // Background
        ctx.save();
        roundRect(ctx, x + gap, y + gap, cs - gap * 2, cs - gap * 2, 7);
        if (hasBlock) {
          ctx.fillStyle = '#2e5a1a';
          ctx.fill();
          ctx.strokeStyle = '#4a7a2a';
          ctx.lineWidth = 1.5;
          ctx.stroke();
        } else if (isPickle) {
          ctx.fillStyle = '#1e4a12';
          ctx.fill();
          ctx.strokeStyle = '#ffd700';
          ctx.lineWidth = 3;
          ctx.stroke();
        } else {
          ctx.fillStyle = '#192e0e';
          ctx.fill();
        }
        ctx.restore();

        // Content emoji
        ctx.save();
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const cx = x + cs / 2, cy = y + cs / 2;

        if (hasBlock) {
          ctx.font = `${Math.floor(cs * 0.52)}px serif`;
          ctx.fillText(this.blockDecor[key] || '🎄', cx, cy);
        } else if (isPickle && isPlayer) {
          // Player found the pickle — show pickle big, player small
          ctx.font = `${Math.floor(cs * 0.55)}px serif`;
          ctx.fillText('🥒', cx, cy - cs * 0.08);
          ctx.font = `${Math.floor(cs * 0.28)}px serif`;
          ctx.fillText('🧒', cx + cs * 0.22, cy + cs * 0.22);
        } else if (isPickle) {
          ctx.font = `${Math.floor(cs * 0.55)}px serif`;
          ctx.fillText('🥒', cx, cy);
        } else if (isPlayer) {
          ctx.font = `${Math.floor(cs * 0.52)}px serif`;
          ctx.fillText('🧒', cx, cy);
        }
        ctx.restore();

        // Gold border glow on player cell
        if (isPlayer && !hasBlock) {
          ctx.save();
          roundRect(ctx, x + gap, y + gap, cs - gap * 2, cs - gap * 2, 7);
          ctx.strokeStyle = '#ffd70066';
          ctx.lineWidth = 3;
          ctx.stroke();
          ctx.restore();
        }

        // Arrow hints: show subtle arrows on cells adjacent to player with blocks
        if (!isPlayer && !hasBlock && !isPickle) {
          const [pr, pc] = this.playerKey.split(',').map(Number);
          const dr = r - pr, dc = c - pc;
          if (Math.abs(dr) + Math.abs(dc) === 1) {
            // Adjacent empty — show subtle move indicator
            ctx.save();
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.globalAlpha = 0.2;
            ctx.font = `${Math.floor(cs * 0.35)}px serif`;
            const arrows = { '-1,0':'⬆','1,0':'⬇','0,-1':'⬅','0,1':'➡' };
            ctx.fillText(arrows[`${dr},${dc}`] || '', cx, cy);
            ctx.restore();
          }
        }
      }
    }

    this._drawLegend();
  }

  _drawLegend() {
    const ctx = this.ctx;
    ctx.save();
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#6a8a5a';
    ctx.fillText('🧒 tap adjacent ornament to push it • find the 🥒 hidden under one', this.canvas.width / 2, this.legendY);
    ctx.restore();
  }

  renderCustomControls(bar) {
    bar.style.flexDirection = 'column';
    bar.style.alignItems = 'center';
    bar.style.gap = '4px';

    const makeBtn = (label, dr, dc) => {
      const btn = document.createElement('button');
      btn.className = 'ctrl-btn';
      btn.textContent = label;
      btn.style.cssText = 'width:52px;padding:8px 0;';
      btn.addEventListener('click', () => this.move(dr, dc));
      return btn;
    };

    const row1 = document.createElement('div');
    row1.style.cssText = 'display:flex;gap:4px;';
    row1.appendChild(makeBtn('⬆', -1, 0));

    const row2 = document.createElement('div');
    row2.style.cssText = 'display:flex;gap:4px;';
    row2.appendChild(makeBtn('⬅', 0, -1));
    row2.appendChild(makeBtn('⬇', 1, 0));
    row2.appendChild(makeBtn('➡', 0, 1));

    bar.appendChild(row1);
    bar.appendChild(row2);
  }
}

// ============================================================
// BOOT
// ============================================================

renderLauncher();
</script>
